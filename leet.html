<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Metrices</title>
    <link rel="stylesheet" href="leet.css">
</head>
<body>
    <div class="container">
        <h1>LeetCode Metrices</h1>

        <div class="user-container">
            <p>Enter your Username Below:</p>

            <div class="user-input-container">
                <input type="text" placeholder="Enter Your UserName: " id="user-input">
                <button id="search-btn">Search</button>
            </div>
        </div>

        <div class="stats-container">

            <div class="progress">

                <div class="progress-item">
                    <div class="easyprogress circle">
                        <span id="easy-label"></span>
                        <p>Easy</p>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="mediumprogress circle">
                        <span id="medium-label"></span>
                        <p>Medium</p>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="hardprogress circle">
                        <span id="hard-label"></span>
                        <p>Hard</p>
                    </div>
                </div>

            </div>

            <div class="stats-cards">
                <!-- Directly populate By JS -->
            </div>

        </div>
    </div>

    <script src="leet.js"></script>
</body>
</html>>
